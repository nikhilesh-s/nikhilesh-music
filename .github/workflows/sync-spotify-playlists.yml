name: Sync Spotify Playlists

on:
  workflow_dispatch:
  schedule:
    - cron: '15 10 * * *'

permissions:
  contents: write

concurrency:
  group: spotify-playlist-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Spotify playlists
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          SPOTIFY_ONLY_OWNER: ${{ secrets.SPOTIFY_ONLY_OWNER }}
        run: npm run spotify:sync

      - name: Commit updated playlist data
        run: |
          if git diff --quiet -- src/data/playlists.generated.json; then
            echo "No playlist changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/playlists.generated.json
          git commit -m "chore: sync spotify playlists"
          git push
